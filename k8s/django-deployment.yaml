# -------------------------------------------------------------------
# Django API Deployment — the core web server.
# Uses Gunicorn with Uvicorn workers for production ASGI serving.
# HPA auto-scales from 2 → 10 replicas based on CPU utilization.
# -------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-api
  namespace: twitter-clone
  labels:
    app: django-api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # One extra pod during rollout
      maxUnavailable: 0   # Zero downtime deploys
  template:
    metadata:
      labels:
        app: django-api
        tier: backend
    spec:
      # Security: Run as non-root user
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: django
          image: prassunduggar/twitter-clone-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: twitter-clone-config
            - secretRef:
                name: twitter-clone-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # Liveness: Is the process alive? Restart if not.
          livenessProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: Can it serve traffic? Remove from LB if not.
          readinessProbe:
            httpGet:
              path: /api/ready/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Startup: Give slow-starting containers time to initialize
          startupProbe:
            httpGet:
              path: /api/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # 30 x 5s = 150s max startup time

      # Run migrations before the main container starts
      initContainers:
        - name: run-migrations
          image: prassunduggar/twitter-clone-api:latest
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: twitter-clone-config
            - secretRef:
                name: twitter-clone-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: django-service
  namespace: twitter-clone
  labels:
    app: django-api
spec:
  type: ClusterIP
  selector:
    app: django-api
  ports:
    - port: 8000
      targetPort: 8000
---
# -------------------------------------------------------------------
# HorizontalPodAutoscaler — automatically scales Django pods
# based on CPU utilization (target: 70%).
# Requires metrics-server to be running in the cluster.
# -------------------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: django-api-hpa
  namespace: twitter-clone
  labels:
    app: django-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
