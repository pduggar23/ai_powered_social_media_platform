# -------------------------------------------------------------------
# Nginx Ingress — single entry point for all external traffic.
# Features: TLS termination, rate limiting, path-based routing.
# Requires: nginx-ingress-controller installed in the cluster.
# -------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twitter-clone-ingress
  namespace: twitter-clone
  labels:
    app: twitter-clone
  annotations:
    # --- Ingress Controller ---
    kubernetes.io/ingress.class: "nginx"

    # --- TLS / SSL ---
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # --- Rate Limiting ---
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "10"

    # --- Proxy Settings ---
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"

    # --- WebSocket Support ---
    nginx.ingress.kubernetes.io/websocket-services: "django-service"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # --- Security Headers ---
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  tls:
    - hosts:
        - twitter-clone.example.com
      secretName: twitter-clone-tls
  rules:
    - host: twitter-clone.example.com
      http:
        paths:
          # API traffic → Django
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  number: 8000
          # GraphQL traffic → Django
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  number: 8000
          # WebSocket traffic → Django (ASGI)
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  number: 8000
          # Prometheus metrics → Django
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  number: 8000
