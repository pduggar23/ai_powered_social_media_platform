# ---------------------------------------------------------------
# Nginx Reverse Proxy Configuration
# Features: Rate limiting, gzip, security headers, WebSocket proxy,
#           static file serving, and upstream load balancing.
# ---------------------------------------------------------------

# --- Rate Limiting Zone ---
# Limits each unique IP to 10 requests/second with a burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --- Upstream: Django Application Servers ---
upstream django_backend {
    # In Docker Compose, "web" resolves to the Django container(s)
    # In K8s, this is handled by the Service/Ingress instead
    server web:8000;

    # Connection keep-alive for performance
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # --- Security Headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Max Upload Size (for tweet images/videos) ---
    client_max_body_size 10M;

    # --- API Endpoints (Rate Limited) ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep-alive
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # --- GraphQL Endpoint ---
    location /graphql/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket Endpoint (No rate limiting — persistent connections) ---
    location /ws/ {
        proxy_pass http://django_backend;

        # Required headers for WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # --- Django Admin ---
    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static Files (served directly by Nginx — much faster) ---
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Media Files (user uploads) ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Prometheus Metrics ---
    location /metrics {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
    }

    # --- Health Check for Nginx itself ---
    location /nginx-health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
