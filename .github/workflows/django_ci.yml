name: Twitter Clone CI/CD

# Trigger on Push or Pull Request to main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ============================================================
  # STAGE 1: Lint — Code quality check (fast fail)
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install flake8
      run: pip install flake8

    - name: Run Linter
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other issues as warnings (max-line-length 120)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ============================================================
  # STAGE 2: Test — Run pytest with PostgreSQL + Redis services
  # ============================================================
  test:
    runs-on: ubuntu-latest
    needs: lint  # Only run if lint passes

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest
      env:
        DB_HOST: localhost
        DB_NAME: test_db
        DB_USER: user
        DB_PASSWORD: password
        REDIS_HOST: localhost
        SECRET_KEY: temporary_secret_key_for_testing
        DEBUG: "True"
      run: |
        pytest --tb=short -q

  # ============================================================
  # STAGE 3: Build — Build & push Docker image
  # ============================================================
  build:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/twitter-clone-api:latest
          ${{ secrets.DOCKER_USERNAME }}/twitter-clone-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ============================================================
  # STAGE 4: Validate — Validate Kubernetes manifests
  # ============================================================
  validate-k8s:
    runs-on: ubuntu-latest
    needs: test  # Run after tests pass (parallel with build)

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Validate Kubernetes Manifests
      run: |
        echo "🔍 Validating Kubernetes manifests..."
        for file in k8s/*.yaml; do
          echo "  ✓ Validating $file"
          kubectl apply --dry-run=client -f "$file" 2>&1 || exit 1
        done
        echo "✅ All manifests are valid!"