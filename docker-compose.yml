version: '3.8'

services:
  # 1. Nginx — Reverse Proxy & Load Balancer (entry point)
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - static_data:/app/static
      - ./media_data:/app/media
    restart: unless-stopped

  # 2. The Django Web Server (behind Nginx)
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./media_data:/app/media
      - static_data:/app/static
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # 3. The Database (PostgreSQL)
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 4. The Message Broker (Redis)
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 5. The Background Worker (Celery — AI/Tasks)
  celery:
    build: .
    command: celery -A backend worker -l info
    volumes:
      - .:/app
      - ./media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 6. Prometheus (Metrics Collector)
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - web
    restart: unless-stopped

  # 7. Grafana (Monitoring Dashboard)
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  postgres_data:
  static_data: